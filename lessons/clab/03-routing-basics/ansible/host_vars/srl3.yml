---
interfaces:
  - name: ethernet-1/1
    ipv4_address: 10.1.3.2/24
    description: Link to srl1
  - name: ethernet-1/2
    ipv4_address: 10.1.5.1/24
    description: Link to host3

static_routes:
  - prefix: 10.1.1.0/24
    next_hop: 10.1.3.1
    description: host1 subnet via hub
  - prefix: 10.1.2.0/24
    next_hop: 10.1.3.1
    description: srl1-srl2 link via hub
  - prefix: 10.1.4.0/24
    next_hop: 10.1.3.1
    description: host2 subnet via hub
