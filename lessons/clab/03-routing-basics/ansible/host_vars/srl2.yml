---
interfaces:
  - name: ethernet-1/1
    ipv4_address: 10.1.2.2/24
    description: Link to srl1
  - name: ethernet-1/2
    ipv4_address: 10.1.4.1/24
    description: Link to host2

static_routes:
  - prefix: 10.1.1.0/24
    next_hop: 10.1.2.1
    description: host1 subnet via hub
  - prefix: 10.1.3.0/24
    next_hop: 10.1.2.1
    description: srl1-srl3 link via hub
  - prefix: 10.1.5.0/24
    next_hop: 10.1.2.1
    description: host3 subnet via hub
