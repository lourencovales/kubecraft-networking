# Lesson 1: Second Containerlab Topology Exercise
# Three SR Linux nodes connected

name: mixed-topology-lab

topology:
  nodes:
    router:
      kind: srl
      image: ghcr.io/nokia/srlinux:24.10.1

    host1:
      kind: linux
      image: alpine:3.20

  links:
    - endpoints: ["router:e1-1", "host1:e1-1"]
